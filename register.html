<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Code Reviewer</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:0.5rem">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                <h2 style="font-size: 1.25rem;">AI Code Reviewer</h2>
            </div>
            <div class="auth-header">
                <h1>Create an account</h1>
            </div>

            <div id="error-alert" class="error-message"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" class="form-control" placeholder="developer@example.com" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <button type="submit" id="register-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const error = document.getElementById('error-alert');
            
            error.style.display = 'none';

            if (password !== confirm) {
                error.textContent = 'Passwords do not match';
                error.style.display = 'block';
                return;
            }

            App.setLoading('register-btn', true, 'Creating account...');
            try {
                const { data, error: supaError } = await App.getSupabase().auth.signUp({
                    email: email,
                    password: password
                });

                if (supaError) throw new Error(supaError.message);
                
                if (!data.session) {
                    // Email confirmation is turned on
                    App.setLoading('register-btn', false);
                    error.style.backgroundColor = 'rgba(46, 213, 115, 0.1)';
                    error.style.borderColor = 'var(--success-color)';
                    error.style.color = 'var(--success-color)';
                    error.textContent = 'Account created! Please check your email inbox to confirm your registration before logging in.';
                    error.style.display = 'block';
                    document.getElementById('register-form').reset();
                    return;
                }

                localStorage.setItem('jwt_token', data.session.access_token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                error.textContent = err.message || 'Registration failed';
                error.style.display = 'block';
                App.setLoading('register-btn', false);
            }
        });
    </script>
</body>
</html>
