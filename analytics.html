<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - AI Code Reviewer</title>
    <link rel="stylesheet" href="styles/main.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .chart-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            height: 350px;
            display: flex;
            flex-direction: column;
        }
        .chart-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
        }
        .full-width {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                <h2>AI Code Reviewer</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="new-review.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    New Review
                </a>
                <a href="history.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Review History
                </a>
                <a href="analytics.html" class="nav-item active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                    Analytics
                </a>
                <a href="settings.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="#" class="nav-item logout-btn" style="color: var(--danger-color);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="top-navbar">
                <div class="user-profile">
                    <span style="font-size: 14px; font-weight: 500;">Developer_User</span>
                    <div class="avatar">
                        <svg viewBox="0 0 32 32" style="fill: var(--text-secondary);"><circle cx="16" cy="10" r="6"/><path d="M16 18c-7.732 0-14 4.477-14 10v2h28v-2c0-5.523-6.268-10-14-10z"/></svg>
                    </div>
                </div>
            </header>

            <div class="main-content">
                <div class="flex justify-between align-center mb-4">
                    <h1>Security & Performance Analytics</h1>
                    <div>
                        <select class="form-control" style="width: auto; padding: 0.5rem 1rem;">
                            <option>Last 30 Days</option>
                            <option>Last 3 Months</option>
                            <option>This Year</option>
                        </select>
                    </div>
                </div>

                <div class="analytics-grid">
                    <!-- Donut Chart -->
                    <div class="chart-container">
                        <h2 class="mb-3" style="font-size: 1.1rem; color: var(--text-primary);">Issues by Severity</h2>
                        <div class="chart-wrapper">
                            <canvas id="severityChart"></canvas>
                        </div>
                    </div>

                    <!-- Bar Chart -->
                    <div class="chart-container">
                        <h2 class="mb-3" style="font-size: 1.1rem; color: var(--text-primary);">Most Common Problem Types</h2>
                        <div class="chart-wrapper">
                            <canvas id="problemsChart"></canvas>
                        </div>
                    </div>

                    <!-- Line Chart (Full Width) -->
                    <div class="chart-container full-width">
                        <h2 class="mb-3" style="font-size: 1.1rem; color: var(--text-primary);">Code Quality Trend (Score out of 10)</h2>
                        <div class="chart-wrapper">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script>
        // Chart.js Default Configs for Dark Mode
        Chart.defaults.color = '#8b949e';
        Chart.defaults.borderColor = '#30363d';
        Chart.defaults.font.family = "'Inter', sans-serif";
        
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Issues by Severity (Doughnut Chart)
            const ctxSeverity = document.getElementById('severityChart').getContext('2d');
            new Chart(ctxSeverity, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            '#da3633', // Danger
                            '#d29922', // Warning-ish
                            '#2f81f7', // Accent/Blue
                            '#238636'  // Success/Green
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'right' }
                    }
                }
            });

            // 2. Most Common Problems (Bar Chart)
            const ctxProblems = document.getElementById('problemsChart').getContext('2d');
            new Chart(ctxProblems, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Incidents found',
                        data: [],
                        backgroundColor: '#2f81f7',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#30363d' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });

            // 3. Code Quality Trend (Line Chart)
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            
            // Gradient fill for line chart
            let gradient = ctxTrend.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(35, 134, 54, 0.5)'); // success color transparent
            gradient.addColorStop(1, 'rgba(35, 134, 54, 0.0)');
            
            new Chart(ctxTrend, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Average Score',
                        data: [],
                        borderColor: '#238636', // success color
                        backgroundColor: gradient,
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#238636',
                        pointBorderColor: '#161b22',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 0,
                            max: 10,
                            grid: { color: '#30363d' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });

        });
    </script>
</body>
</html>
