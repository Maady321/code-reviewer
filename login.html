<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Code Reviewer</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                </svg>
                <h2 style="font-size: 1.25rem;">AI Code Reviewer</h2>
            </div>
            <div class="auth-header">
                <h1>Sign in to your account</h1>
            </div>

            <div id="error-alert" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" class="form-control" placeholder="developer@example.com" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <div class="auth-footer">
                New to AI Code Reviewer? <a href="register.html">Create an account</a>.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('error-alert');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            App.setLoading('login-btn', true, 'Signing in...');
            error.style.display = 'none';

            try {
                const { data, error: supaError } = await App.getSupabase().auth.signInWithPassword({
                    email: email, 
                    password: password 
                });
                
                if (supaError) throw new Error(supaError.message);
                
                localStorage.setItem('jwt_token', data.session.access_token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                error.textContent = err.message || 'Invalid credentials';
                error.style.display = 'block';
                App.setLoading('login-btn', false);
            }
        });
    </script>
</body>
</html>
